name: schema/trade_decision
description: TradeDecision field descriptions used by response_format schema.
fields:
  should_trade: "Only true if YOUR probability exceeds implied odds probability by 5%+ (meaningful edge)"
  outcome: "The outcome you predict will win"
  confidence: "Your probability estimate (0.0-1.0)."
  bet_size_pct: "Fraction of max bet (0.0-1.0). Scale with edge size, not just confidence."
  reasoning: "MUST include: 1) Implied prob from odds, 2) Your prob estimate, 3) Calculated edge (your prob - implied prob), 4) Why edge exists"
  implied_prob_external: "Optional externally sourced implied probability from books/polls/markets."
  my_prob: "Optional explicit analyst probability estimate."
  edge_external: "Optional explicit edge from external implied probability (my_prob - implied_prob_external)."
  edge_source: "Source of edge calculation (computed, fallback, or none)."
  evidence_basis: "Evidence basis class (direct, proxy, or absence_only)."
  likelihood_ratio: "Optional likelihood ratio P(evidence|predicted_outcome) / P(evidence|alternative_outcome)."
  evidence_quality: "Evidence quality score (0-1), set by validation layer."
  abstain: "True when evidence quality is too weak to act on this cycle."
  raw_should_trade: "Raw model value before validation and enforcement."
  raw_outcome: "Raw model outcome before canonical normalization."
  raw_confidence: "Raw model confidence before normalization and capping."
  raw_bet_size_pct: "Raw model bet size before validation and policy gates."
  raw_reasoning: "Raw model reasoning before validator annotations."
  raw_evidence_quality: "Raw model evidence quality before validation recalibration."
  definitive_outcome_detected: "True when definitive settlement-aligned evidence is detected."
  evidence_quality_floor_applied: "Name of the evidence-quality floor rule applied during validation."
  prompt_tokens: "Prompt token usage captured from provider response."
  completion_tokens: "Completion token usage captured from provider response."
  reasoning_tokens: "Reasoning token usage captured from provider response."
  cached_tokens: "Cached prompt token usage captured from provider response."
