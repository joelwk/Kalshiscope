name: user/market_analysis_request
description: User prompt envelope with market context and constraints.
content: |
  <market_data>
  ticker={ticker}
  question={question}
  subtitle={subtitle}
  resolution_criteria={resolution_criteria}
  outcomes={outcomes}
  market_outcome_prices={market_outcome_prices}
  liquidity_usdc={liquidity_usdc}
  research_profile={research_profile}
  lookback_hours={lookback_hours}
  previous_analysis={previous_analysis}
  </market_data>
  <constraints>
  {constraints}
  </constraints>
